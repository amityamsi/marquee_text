name: marquee_pro
description: "Marquee Text is a Flutter widget for smooth, infinitely scrolling
  text, rich content, and custom widgets with flexible controls for direction,
  speed, fading edges, pauses, and animated colors."
version: 1.0.0
homepage: https://github.com/amityamsi/marquee_pro
repository: https://github.com/amityamsi/marquee_pro
issue_tracker: https://github.com/amityamsi/marquee_pro/issues
documentation: https://github.com/amityamsi/marquee_pro/wiki
topics:
  - marquee
  - animation
  - text
  - ticker
  - widget

screenshots:
  - description: "Animated demo of the Marquee widget showing smooth scrolling text."
    path: assets/demo.gif

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  fading_edge_scrollview: ^4.1.1
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

false_secrets:
  - /example/android/.gradle
